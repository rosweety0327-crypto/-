<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入 viewport 設置，防止 iPad 自動縮放，user-scalable=no 很重要 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小魚跳跳：iPad 觸控版</title>
    <style>
        /* 防止 iPad 上出現選取文字或長按選單，並鎖定畫面滑動 */
        * { -webkit-touch-callout: none; -webkit-user-select: none; touch-action: none; }
        
        body { background: #050a10; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* 讓畫布根據螢幕高度自動調整比例，確保 iPad 顯示不會跑掉 */
        canvas { 
            background: linear-gradient(to bottom, #111d2b 0%, #050a10 100%); 
            border: 4px solid #58a6ff; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.3); 
            max-width: 95vw;
            max-height: 80vh;
            cursor: pointer; 
        }

        .ui { position: absolute; top: 20px; width: 100%; pointer-events: none; }
        .score-board { font-size: 32px; font-weight: bold; color: #58a6ff; text-shadow: 0 0 10px rgba(88,166,255,0.5); }
        button { background: #161b22; color: #58a6ff; border: 1px solid #30363d; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="score-board" id="current-score">0</div>
        <div style="color: #8b949e;">💎 點數：<span id="pts">...</span></div>
        <div style="margin-top: 10px;"><button onclick="location.href='index.html'">🏰 返回基地</button></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 500;

        let db = JSON.parse(localStorage.getItem('lord_mega_db_v5')) || {pts: 0};
        
        let bird = { x: 80, y: 250, v: 0, g: 0.1, jump: -3.5, angle: 0 };
        let pipes = [];
        let score = 0;
        let gameActive = true;
        let frame = 0;
        let speed = 2.0;

        function spawnPipe() {
            const gap = 150; 
            const h = Math.random() * (canvas.height - gap - 100) + 50;
            pipes.push({ x: canvas.width, topH: h, bottomY: h + gap, passed: false });
        }

        function draw() {
            if(!gameActive) return;
            frame++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bird.v += bird.g;
            bird.y += bird.v;
            bird.angle = Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.v * 0.1));

            ctx.fillStyle = "#30363d";
            ctx.strokeStyle = "#58a6ff";
            pipes.forEach((p, i) => {
                p.x -= speed;
                ctx.fillRect(p.x, 0, 50, p.topH);
                ctx.strokeRect(p.x, 0, 50, p.topH);
                ctx.fillRect(p.x, p.bottomY, 50, canvas.height - p.bottomY);
                ctx.strokeRect(p.x, p.bottomY, 50, canvas.height - p.bottomY);

                if(!p.passed && bird.x > p.x + 50) {
                    p.passed = true; score++; 
                    speed += 0.03; 
                    db.pts += 50; save();
                    document.getElementById('current-score').innerText = score;
                }

                if(bird.x + 12 > p.x && bird.x - 12 < p.x + 50) {
                    if(bird.y - 12 < p.topH || bird.y + 12 > p.bottomY) gameOver();
                }
            });

            if(pipes.length > 0 && pipes[0].x < -60) pipes.shift();
            if(frame % 110 === 0) spawnPipe();
            if(bird.y > canvas.height || bird.y < 0) gameOver();

            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.angle);
            ctx.fillStyle = "#ff79c6";
            ctx.beginPath(); ctx.ellipse(0, 0, 18, 12, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-25, -8); ctx.lineTo(-25, 8); ctx.closePath(); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(8, -3, 4, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameActive = false;
            setTimeout(() => { alert(`得分：${score}\n點數已儲存！`); location.reload(); }, 300);
        }

        function save() { 
            localStorage.setItem('lord_mega_db_v5', JSON.stringify(db)); 
            document.getElementById('pts').innerText = Math.floor(db.pts);
        }

        // --- 核心改動：支援 iPad 觸控 ---
        const handleJump = (e) => {
            if (e) e.preventDefault(); // 防止 iPad 點擊時產生縮放或滑動
            bird.v = bird.jump;
        };

        window.addEventListener('touchstart', handleJump, { passive: false }); // iPad 專用觸控監聽
        window.onclick = handleJump; // 電腦端維持滑鼠點擊

        document.getElementById('pts').innerText = db.pts;
        spawnPipe();
        draw();
    </script>
</body>
</html>
