<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小宥領主的基地 | V5.8 旗艦大廳</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --gold: #f1c40f; 
            --red: #ff4757; --green: #2ecc71; --pink: #ff79c6; --text: #c9d1d9;
        }
        
        /* 修正：確保 html 和 body 允許滾動，不限制高度 */
        html, body { 
            height: auto; 
            min-height: 100%; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; /* 防止左右晃動 */
            overflow-y: auto;   /* 確保上下可以滾動 */
        }

        body {
            padding: 20px;
            text-align: center;
            /* 修正：增加底部內距，避免被音樂列擋住最後一個區塊 */
            padding-bottom: 120px; 
        }
        
        .lord-panel { 
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%); 
            border: 1px solid #30363d; 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border-top: 3px solid var(--blue); 
        }
        
        .pts-counter { font-size: 36px; color: var(--gold); font-weight: bold; text-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .section-header { 
            text-align: left; 
            max-width: 1000px; 
            margin: 40px auto 15px; 
            color: var(--blue); 
            border-left: 5px solid var(--blue); 
            padding-left: 15px; 
            font-weight: bold; 
        }

        .game-card { 
            background: var(--card); 
            border: 1px solid #30363d; 
            border-radius: 18px; 
            padding: 20px; 
            transition: 0.3s; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-card:hover { transform: translateY(-8px); border-color: var(--blue); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .game-card .icon { font-size: 40px; margin-bottom: 10px; }
        .game-card .tag { position: absolute; top: 0; right: 0; background: var(--blue); color: white; font-size: 10px; padding: 4px 10px; border-bottom-left-radius: 12px; }

        .store-card { border-color: #3e331b; background: linear-gradient(to bottom, #1c1910, #161b22); }
        .char-slot { opacity: 0.2; filter: grayscale(1); border: 2px dashed #444; }
        .char-slot.active { opacity: 1; filter: grayscale(0); border: 2px solid var(--pink); background: rgba(255, 121, 198, 0.05); }

        /* 固定在底部的音樂列 */
        #music-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(22, 27, 34, 0.95); 
            backdrop-filter: blur(10px); 
            padding: 15px 0; 
            border-top: 1px solid var(--pink); 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            align-items: center; 
            z-index: 2000; 
        }
        .control-btn { background: #30363d; border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .control-btn:hover { background: var(--pink); }
    </style>
</head>
<body>

    <div class="lord-panel">
        <div style="color:var(--blue); font-size: 14px; letter-spacing: 2px;">LORD BASE V5.8</div>
        <h1 style="margin: 10px 0;">🏰 小宥領主的基地</h1>
        <div id="display-title" style="color: var(--pink); margin-bottom: 10px;">稱號：冒險者</div>
        <div class="pts-counter">💎 <span id="display-points">0</span></div>
    </div>

    <div class="section-header">🔥 本日最推薦</div>
    <div class="grid">
        <div class="game-card" style="border-color: var(--red);" onclick="play('狼人殺.html')">
            <div class="tag" style="background:var(--red);">New</div>
            <div class="icon">🐺</div><div class="title">狼人殺大廳</div>
        </div>
        <div class="game-card" style="border-color: var(--pink);" onclick="location.href='jump.html'">
            <div class="tag">Flagship</div>
            <div class="icon">🐟</div><div class="title">小魚跳跳</div>
        </div>
        <div class="game-card" style="border-color: var(--gold);" onclick="location.href='gamble.html'">
            <div class="tag" style="background:var(--gold); color:black;">Jackpot</div>
            <div class="icon">🎡</div><div class="title">黃金轉盤</div>
        </div>
    </div>

    <div class="section-header">🎮 經典娛樂中心</div>
    <div class="grid">
        <div class="game-card" onclick="play('競賽貓站.html')"><div class="icon">🐈</div><div class="title">競賽貓站</div></div>
        <div class="game-card" onclick="play('太古大戰.html')"><div class="icon">🥁</div><div class="title">太鼓達人</div></div>
        <div class="game-card" onclick="play('clicker.html')"><div class="icon">🚜</div><div class="title">收割工廠</div></div>
        <div class="game-card" onclick="play('tetris.html')"><div class="icon">🧱</div><div class="title">方塊挑戰</div></div>
        <div class="game-card" onclick="play('四子棋.html')"><div class="icon">🔴</div><div class="title">四子棋</div></div>
        <div class="game-card" onclick="play('槍戰 2.html')"><div class="icon">🔫</div><div class="title">草原槍戰</div></div>
    </div>

    <div class="section-header">🛒 領主特選商店</div>
    <div class="grid">
        <div id="buy-char-1" class="game-card store-card" onclick="unlock('char-1', '小魚', 500, 'char')">👤 解鎖小魚<br><span style="color:var(--gold);">500 💎</span></div>
        <div id="buy-char-2" class="game-card store-card" onclick="unlock('char-2', '希', 500, 'char')">👧 解鎖希<br><span style="color:var(--gold);">500 💎</span></div>
    </div>

    <div class="section-header">🖼️ 角色展示 (VRM)</div>
    <div class="grid">
        <div id="char-1" class="game-card char-slot">
            <div class="icon">🐟</div>
            <div class="title">小魚</div>
            <a href="小魚.vrm" download style="color:var(--gold); font-size:11px; text-decoration:none; margin-top:10px;">[下載模型]</a>
        </div>
        <div id="char-2" class="game-card char-slot">
            <div class="icon">🎀</div>
            <div class="title">希 (姊姊)</div>
            <a href="希.vrm" download style="color:var(--gold); font-size:11px; text-decoration:none; margin-top:10px;">[下載模型]</a>
        </div>
    </div>

    <div id="music-bar">
        <div id="track-name" style="font-size:13px; color:var(--pink); font-weight:bold;">🎵 音樂播放中...</div>
        <button class="control-btn" onclick="switchTrack()">⏭</button>
        <button class="control-btn" onclick="playPause()">▶/⏸</button>
    </div>

    <audio id="audio" loop><source id="audio-src" src="《全力展開！閃光射線》.mp3"></audio>

    <script>
        let db = JSON.parse(localStorage.getItem('lord_mega_db_v5')) || { pts: 100, title: '新進冒險者', chars: [] };
        const playlist = [
            {n: "閃光射線", f: "《全力展開！閃光射線》.mp3"}, 
            {n: "赤き月的欠片", f: "赤き月的欠片 (1).mp3"}, 
            {n: "光のキセキ", f: "光のキセキ.mp3"}
        ];
        let curT = 0;

        function play(url) { db.pts += 50; save(); location.href = url; }
        function save() { localStorage.setItem('lord_mega_db_v5', JSON.stringify(db)); refresh(); }
        function refresh() {
            document.getElementById('display-points').innerText = Math.floor(db.pts);
            document.getElementById('display-title').innerText = "稱號：" + db.title;
            db.chars.forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.classList.add('active'); el.style.opacity = "1"; el.style.filter = "none"; }
                const buyBtn = document.getElementById('buy-'+id);
                if(buyBtn) buyBtn.innerHTML = "✅ 已擁有";
            });
        }
        function unlock(id, name, cost, type) {
            if(db.pts >= cost && !db.chars.includes(id)) {
                db.pts -= cost; db.chars.push(id); save();
                alert("🎉 恭喜解鎖 " + name + "！");
            } else if(db.chars.includes(id)) { alert("已經買過囉！"); }
            else { alert("錢不夠啦，再去玩小魚跳跳！"); }
        }
        function playPause() { const a = document.getElementById('audio'); if(a.paused) a.play(); else a.pause(); }
        function switchTrack() {
            curT = (curT + 1) % playlist.length;
            document.getElementById('audio-src').src = encodeURIComponent(playlist[curT].f);
            document.getElementById('track-name').innerText = "🎵 " + playlist[curT].n;
            document.getElementById('audio').load(); document.getElementById('audio').play();
        }
        refresh();
    </script>
</body>
</html>
