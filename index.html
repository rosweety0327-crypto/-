<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小宥領主的數位基地 V3.2</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --red: #ff4757;
            --gold: #f1c40f; --purple: #8e44ad; --cyan: #00d2ff; --pink: #ff79c6;
            --yt-red: #ff0000; --green: #2ecc71; --text: #c9d1d9;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #ffffff; text-shadow: 0 0 15px rgba(88,166,255,0.4); margin-bottom: 5px; }
        .version-tag { font-size: 11px; color: var(--gold); margin-bottom: 25px; display: block; letter-spacing: 1px; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; padding-bottom: 120px; }
        
        .card { background: var(--card); border: 2px solid #30363d; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; min-height: 120px; justify-content: center; }
        .card:hover { border-color: var(--blue); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(88,166,255,0.2); }
        .card:active { transform: scale(0.95); }
        
        .icon { font-size: 40px; margin-bottom: 8px; }
        .title { font-weight: bold; font-size: 14px; color: #fff; margin-bottom: 4px; }
        .desc { font-size: 10px; color: #8b949e; }

        #music-player { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(22,27,34,0.98); border: 2px solid var(--pink); 
            border-radius: 50px; padding: 10px 25px; display: none; 
            align-items: center; gap: 15px; z-index: 1000; box-shadow: 0 0 25px rgba(255, 121, 198, 0.4);
            backdrop-filter: blur(10px);
        }
        .play-btn { background: var(--pink); border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        #song-title { font-size: 12px; color: white; min-width: 140px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🏰 小宥領主的基地</h1>
    <span class="version-tag">SYSTEM V3.2 | SPRING PARADE UPDATE</span>

    <div class="container">
        <div class="card" style="border-color: var(--yt-red);" onclick="window.open('https://www.youtube.com/@小魚-v9e', '_blank')">
            <div class="icon">📺</div><div class="title">小魚 YouTube</div><div class="desc">前往頻道</div>
        </div>
        <div class="card" style="border-color: var(--red);" onclick="goTo('library.html')">
            <div class="icon">📖</div><div class="title">血之遺痕</div><div class="desc">圖書館</div>
        </div>
        <div class="card" style="border-color: var(--pink);" onclick="toggleMusic()">
            <div class="icon">🎧</div><div class="title">音樂庫</div><div class="desc">5 首神曲</div>
        </div>

        <div class="card" style="border-color: var(--pink);" onclick="goTo('pretty_cure.html')">
            <div class="icon">✨</div><div class="title">光之美少女</div><div class="desc">雙人對決</div>
        </div>
        <div class="card" style="border-color: #bd93f9;" onclick="goTo('tetris.html')">
            <div class="icon">🧱</div><div class="title">俄羅斯方塊</div><div class="desc">經典方塊</div>
        </div>
        <div class="card" style="border-color: var(--gold);" onclick="goTo('競賽貓站.html')">
            <div class="icon">🐈</div><div class="title">競賽貓站</div><div class="desc">貓咪大戰爭</div>
        </div>
        <div class="card" style="border-color: var(--purple);" onclick="goTo('狼人殺.html')">
            <div class="icon">🐺</div><div class="title">連線狼人殺</div><div class="desc">智力對決</div>
        </div>
        <div class="card" style="border-color: var(--cyan);" onclick="goTo('太古大戰.html')">
            <div class="icon">🥁</div><div class="title">太鼓達人</div><div class="desc">節奏挑戰</div>
        </div>
        <div class="card" style="border-color: var(--green);" onclick="goTo('數獨.html')">
            <div class="icon">🔢</div><div class="title">終極數獨</div><div class="desc">邏輯訓練</div>
        </div>
        <div class="card" style="border-color: var(--blue);" onclick="goTo('四子棋.html')">
            <div class="icon">🔴</div><div class="title">連線四子棋</div><div class="desc">雙人策略</div>
        </div>
        <div class="card" onclick="goTo('槍戰 2.html')">
            <div class="icon">🔫</div><div class="title">草原槍戰 2</div><div class="desc">生存射擊</div>
        </div>
    </div>

    <div id="music-player">
        <span id="song-title">載入中...</span>
        <div style="display: flex; gap: 8px;">
            <button class="play-btn" onclick="switchSong(-1)">⏮</button>
            <button class="play-btn" id="ctrl-btn" onclick="controlAudio()">▶</button>
            <button class="play-btn" onclick="switchSong(1)">⏭</button>
        </div>
    </div>

    <audio id="bgm" loop><source id="audio-source" src="《全力展開！閃光射線》.mp3" type="audio/mpeg"></audio>

    <script>
        function goTo(page) { window.location.href = './' + encodeURIComponent(page); }

        const audio = document.getElementById('bgm');
        const source = document.getElementById('audio-source');
        const ctrlBtn = document.getElementById('ctrl-btn');
        const titleText = document.getElementById('song-title');

        // 音樂清單更新：加入了 春のパレード
        const playlist = [
            { name: "閃光射線", file: "《全力展開！閃光射線》.mp3" },
            { name: "赤き月的欠片", file: "赤き月的欠片 (1).mp3" },
            { name: "光のキセキ", file: "光のキセキ.mp3" },
            { name: "冒險更新", file: "冒険のアップデート.mp3" },
            { name: "春のパレード", file: "春のパレード.mp3" }
        ];
        let currentIdx = 0;

        function toggleMusic() { 
            document.getElementById('music-player').style.display = 'flex';
            titleText.innerText = playlist[currentIdx].name;
        }

        function controlAudio() { 
            if(audio.paused) { audio.play(); ctrlBtn.innerText = '⏸'; } 
            else { audio.pause(); ctrlBtn.innerText = '▶'; }
        }

        function switchSong(direction) {
            currentIdx = (currentIdx + direction + playlist.length) % playlist.length;
            source.src = encodeURIComponent(playlist[currentIdx].file);
            titleText.innerText = playlist[currentIdx].name;
            audio.load(); audio.play(); ctrlBtn.innerText = '⏸';
        }
    </script>
</body>
</html>
