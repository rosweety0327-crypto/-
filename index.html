<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小宥領主的數位基地 | 點數冒險系統</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --red: #ff4757;
            --gold: #f1c40f; --purple: #8e44ad; --cyan: #00d2ff; --pink: #ff79c6;
            --yt-red: #ff0000; --green: #2ecc71; --text: #c9d1d9;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .stats-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        
        .badge { background: rgba(88, 166, 255, 0.1); border: 1px solid var(--blue); padding: 5px 15px; border-radius: 20px; font-size: 13px; color: var(--blue); display: flex; align-items: center; }
        .points-badge { border-color: var(--gold); color: var(--gold); background: rgba(241, 196, 15, 0.1); }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; padding-bottom: 120px; }
        .card { background: var(--card); border: 2px solid #30363d; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; min-height: 120px; justify-content: center; position: relative; }
        .card:hover { border-color: var(--blue); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(88,166,255,0.2); }
        
        /* 鎖定遊戲樣式 */
        .locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        .lock-icon { position: absolute; top: 10px; right: 10px; font-size: 18px; }

        .icon { font-size: 40px; margin-bottom: 8px; }
        .title { font-weight: bold; font-size: 14px; color: #fff; }
        
        #music-player { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(22,27,34,0.95); border: 2px solid var(--pink); border-radius: 50px; padding: 10px 25px; display: none; align-items: center; gap: 15px; z-index: 1000; }
        .play-btn { background: var(--pink); border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <h1>🏰 小宥領主的基地</h1>
    
    <div class="stats-bar">
        <div class="badge">
            ⚔️ 訪客：<img src="https://profile-counter.glitch.me/rosweety0327-crypto/count.svg" height="20" style="margin-left:5px; filter: hue-rotate(200deg);">
        </div>
        <div class="badge points-badge">
            💎 冒險點數：<span id="point-display">0</span>
        </div>
    </div>

    <div class="container">
        <div class="card" style="border-color: var(--yt-red);" onclick="earnPoints(); window.open('https://www.youtube.com/@小魚-v9e', '_blank')">
            <div class="icon">📺</div><div class="title">小魚 YouTube</div>
        </div>
        <div class="card" style="border-color: var(--red);" onclick="earnPoints(); goTo('library.html')">
            <div class="icon">📖</div><div class="title">血之遺痕</div>
        </div>
        <div class="card" style="border-color: var(--pink);" onclick="toggleMusic()">
            <div class="icon">🎧</div><div class="title">音樂庫</div>
        </div>

        <div class="card" style="border-color: #bd93f9;" onclick="earnPoints(); goTo('tetris.html')">
            <div class="icon">🧱</div><div class="title">俄羅斯方塊</div>
        </div>
        <div class="card" style="border-color: var(--gold);" onclick="earnPoints(); goTo('競賽貓站.html')">
            <div class="icon">🐈</div><div class="title">競賽貓站</div>
        </div>
        <div class="card" style="border-color: var(--purple);" onclick="earnPoints(); goTo('狼人殺.html')">
            <div class="icon">🐺</div><div class="title">狼人殺大廳</div>
        </div>
        <div class="card" style="border-color: var(--cyan);" onclick="earnPoints(); goTo('太古大戰.html')">
            <div class="icon">🥁</div><div class="title">太鼓達人</div>
        </div>
        <div class="card" style="border-color: var(--green);" onclick="earnPoints(); goTo('數獨.html')">
            <div class="icon">🔢</div><div class="title">數獨</div>
        </div>
        <div class="card" style="border-color: #27ae60;" onclick="earnPoints(); goTo('數字炸彈.html')">
            <div class="icon">💣</div><div class="title">數字炸彈</div>
        </div>
        <div class="card" style="border-color: #2980b9;" onclick="earnPoints(); goTo('四子棋.html')">
            <div class="icon">🔴</div><div class="title">四子棋</div>
        </div>
        <div class="card" onclick="earnPoints(); goTo('槍戰 2.html')">
            <div class="icon">🔫</div><div class="title">草原槍戰 2</div>
        </div>

        <div class="card locked" onclick="checkUnlock(500, '神祕新角色')">
            <div class="lock-icon">🔒</div>
            <div class="icon">👤</div>
            <div class="title">500 點解鎖</div>
        </div>
    </div>

    <div id="music-player">
        <span id="song-title" style="color:white; font-size:11px;">載入中...</span>
        <div style="display: flex; gap: 8px;">
            <button class="play-btn" onclick="switchSong(-1)">⏮</button>
            <button class="play-btn" id="ctrl-btn" onclick="controlAudio()">▶</button>
            <button class="play-btn" onclick="switchSong(1)">⏭</button>
        </div>
    </div>

    <audio id="bgm" loop><source id="audio-source" src="《全力展開！閃光射線》.mp3" type="audio/mpeg"></audio>

    <script>
        // --- 💎 點數系統核心邏輯 ---
        let points = parseInt(localStorage.getItem('adventurer_points')) || 0;
        updateDisplay();

        function earnPoints() {
            points += 10;
            savePoints();
            updateDisplay();
        }

        function checkUnlock(cost, name) {
            if(points >= cost) {
                alert("恭喜！你已解鎖 " + name + "！(此為預告功能，敬請期待領主更新)");
            } else {
                alert("點數不足！還差 " + (cost - points) + " 點即可解鎖。快去玩遊戲賺點數吧！");
            }
        }

        function savePoints() { localStorage.setItem('adventurer_points', points); }
        function updateDisplay() { document.getElementById('point-display').innerText = points; }
        
        // --- 原有功能 ---
        function goTo(page) { window.location.href = './' + encodeURIComponent(page); }
        const audio = document.getElementById('bgm');
        const source = document.getElementById('audio-source');
        const titleText = document.getElementById('song-title');
        const playlist = [
            { name: "閃光射線", file: "《全力展開！閃光射線》.mp3" },
            { name: "赤き月的欠片", file: "赤き月的欠片 (1).mp3" },
            { name: "光のキセキ", file: "光のキセキ.mp3" },
            { name: "冒險更新", file: "冒險のアップデート.mp3" },
            { name: "春のパレード", file: "春のパレード.mp3" }
        ];
        let currentIdx = 0;
        function toggleMusic() { document.getElementById('music-player').style.display = 'flex'; titleText.innerText = playlist[currentIdx].name; }
        function controlAudio() { if(audio.paused) { audio.play(); document.getElementById('ctrl-btn').innerText = '⏸'; } else { audio.pause(); document.getElementById('ctrl-btn').innerText = '▶'; } }
        function switchSong(dir) {
            currentIdx = (currentIdx + dir + playlist.length) % playlist.length;
            source.src = encodeURIComponent(playlist[currentIdx].file);
            titleText.innerText = playlist[currentIdx].name;
            audio.load(); audio.play(); document.getElementById('ctrl-btn').innerText = '⏸';
        }
    </script>
</body>
</html>
