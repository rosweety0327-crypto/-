<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小宥領主的槍戰與劍術 - 戰神版</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #ui { position: fixed; top: 20px; left: 20px; font-family: monospace; font-size: 20px; text-shadow: 2px 2px #000; z-index: 10; }
        #hp-bar { width: 200px; height: 10px; background: #333; border: 1px solid #fff; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #ff4757; transition: 0.3s; }
        #inv { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
        .slot { width: 60px; height: 60px; background: rgba(0,0,0,0.7); border: 2px solid #555; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .slot.active { border-color: #0f0; background: rgba(0,255,0,0.2); }
        .joy-area { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; border: 2px solid rgba(255,255,255,0.2); }
        .joy-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.5; }
        #act-btn { position: fixed; bottom: 60px; right: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 4px solid #fff; display: none; align-items: center; justify-content: center; font-size: 40px; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; text-align: center; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="start()">
        <div>
            <h1>🗡️ 領主的終極演武 V8.9</h1>
            <p>點擊螢幕開始遊戲</p>
            <p style="color: #0f0;">滑鼠/觸控往左轉 = 視角往左轉</p>
        </div>
    </div>

    <div id="ui">
        KILLS: <span id="score">0</span>
        <div id="hp-bar"><div id="hp-fill"></div></div>
    </div>
    
    <div id="crosshair"></div>
    
    <div id="inv">
        <div id="s1" class="slot active" onclick="switchWep('sword')">🗡️</div>
        <div id="s2" class="slot" onclick="switchWep('gun')">🔫</div>
    </div>

    <div class="joy-area" id="joy-base"><div class="joy-stick" id="joy-stick"></div></div>
    <div id="act-btn">⚔️</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.1/three.min.js"></script>

    <script>
        let scene, camera, renderer, sword, gun, flash, score = 0, hp = 100;
        let mode = "sword", isAtk = false, targets = [], keys = {};
        let isTouch = ('ontouchstart' in window);
        let moveJoy = { x: 0, z: 0 };

        function start() {
            document.getElementById('overlay').style.display = 'none';
            if (isTouch) {
                document.getElementById('joy-base').style.display = 'block';
                document.getElementById('act-btn').style.display = 'flex';
            } else {
                document.body.requestPointerLock();
            }
            if (!scene) init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 5, 35);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const light = new THREE.PointLight(0x00ff00, 1, 20);
            light.position.set(0, 5, 0);
            scene.add(light);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x111, roughness: 0.8}));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            createWeps();
            setupInput();
            for (let i = 0; i < 6; i++) spawnEnemy();
            animate();
        }

        function createWeps() {
            sword = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.2, 0.08), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 1}));
            blade.position.y = 0.5;
            sword.add(blade);
            sword.position.set(0.4, -0.5, -0.6);
            camera.add(sword);

            gun = new THREE.Group();
            const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.18, 0.5), new THREE.MeshStandardMaterial({color: 0x222}));
            flash = new THREE.PointLight(0xffff00, 0, 3);
            const fMesh = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color: 0xffff00, transparent: true, opacity: 0}));
            fMesh.position.z = -0.4;
            gun.add(gBody, fMesh, flash);
            gun.position.set(0.35, -0.3, -0.5);
            camera.add(gun);
            
            switchWep('sword');
            scene.add(camera);
        }

        function switchWep(t) {
            mode = t;
            sword.visible = (t === 'sword');
            gun.visible = (t === 'gun');
            document.getElementById('s1').className = t === 'sword' ? 'slot active' : 'slot';
            document.getElementById('s2').className = t === 'gun' ? 'slot active' : 'slot';
            document.getElementById('act-btn').innerText = t === 'sword' ? '⚔️' : '💥';
        }

        function setupInput() {
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.key === '1') switchWep('sword');
                if (e.key === '2') switchWep('gun');
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('mousedown', () => { if (!isTouch) attack(); });
            
            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                }
            });

            const base = document.getElementById('joy-base');
            const stick = document.getElementById('joy-stick');
            document.getElementById('act-btn').addEventListener('touchstart', (e) => { e.preventDefault(); attack(); });

            base.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const r = base.getBoundingClientRect();
                const dx = t.clientX - (r.left + 60);
                const dy = t.clientY - (r.top + 60);
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                const a = Math.atan2(dy, dx);
                moveJoy = { x: Math.cos(a)*(d/40), z: Math.sin(a)*(d/40) };
                stick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
            });
            base.addEventListener('touchend', () => { moveJoy = {x:0, z:0}; stick.style.transform = 'translate(0px, 0px)'; });

            window.addEventListener('touchmove', (e) => {
                if (e.touches[0].clientX > window.innerWidth / 2) {
                    const t = e.touches[0];
                    if (window.lT) {
                        camera.rotation.y -= (t.clientX - window.lT.x) * 0.006;
                        camera.rotation.x -= (t.clientY - window.lT.y) * 0.006;
                        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                    }
                    window.lT = { x: t.clientX, y: t.clientY };
                }
            });
            window.addEventListener('touchend', () => window.lT = null);
        }

        function attack() {
            if (isAtk || hp <= 0) return;
            isAtk = true;
            if (mode === 'sword') {
                let startT = Date.now();
                function swing() {
                    let progress = (Date.now() - startT) / 150;
                    if (progress < 1) {
                        sword.rotation.x = -Math.sin(progress * Math.PI) * 1.5;
                        checkHit(2.5);
                        requestAnimationFrame(swing);
                    } else { sword.rotation.x = 0; isAtk = false; }
                }
                swing();
            } else {
                flash.intensity = 2; gun.children[1].material.opacity = 1;
                checkHit(30);
                setTimeout(() => { flash.intensity = 0; gun.children[1].material.opacity = 0; isAtk = false; }, 60);
            }
        }

        function checkHit(range) {
            const ray = new THREE.Raycaster();
            ray.setFromCamera({x:0, y:0}, camera);
            ray.far = range;
            const hits = ray.intersectObjects(targets);
            if (hits.length > 0) {
                const obj = hits[0].object;
                scene.remove(obj);
                targets = targets.filter(t => t !== obj);
                score++;
                document.getElementById('score').innerText = score;
                setTimeout(spawnEnemy, 1000);
            }
        }

        function spawnEnemy() {
            const geo = new THREE.CylinderGeometry(0.4, 0.4, 1.6);
            const mat = new THREE.MeshStandardMaterial({color: 0xff4757});
            const bot = new THREE.Mesh(geo, mat);
            const ang = Math.random() * Math.PI * 2;
            const d = 15 + Math.random() * 5;
            bot.position.set(camera.position.x + Math.cos(ang)*d, 0.8, camera.position.z + Math.sin(ang)*d);
            scene.add(bot);
            targets.push(bot);
        }

        function animate() {
            if (hp <= 0) return;
            requestAnimationFrame(animate);
            const speed = 0.12;
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

            if (!isTouch) {
                if (keys['KeyW']) camera.position.addScaledVector(dir, speed);
                if (keys['KeyS']) camera.position.addScaledVector(dir, -speed);
                if (keys['KeyA']) camera.position.addScaledVector(side, speed);
                if (keys['KeyD']) camera.position.addScaledVector(side, -speed);
            } else {
                camera.position.addScaledVector(dir, -moveJoy.z * speed);
                camera.position.addScaledVector(side, -moveJoy.x * speed);
            }

            targets.forEach(t => {
                const d = t.position.distanceTo(camera.position);
                if (d > 1.2) {
                    t.position.addScaledVector(new THREE.Vector3().subVectors(camera.position, t.position).normalize(), 0.04);
                } else {
                    hp -= 0.2;
                    document.getElementById('hp-fill').style.width = hp + "%";
                    if (hp <= 0) { alert("Game Over! 擊殺數: " + score); location.reload(); }
                }
                t.lookAt(camera.position.x, 0.8, camera.position.z);
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
