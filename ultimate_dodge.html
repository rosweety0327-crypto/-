<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 領主私房遊戲 | 究極閃躲：雙人對決</title>
    <style>
        :root { --p1: #33ff33; --p2: #ff3333; --bomb: #ffaa00; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-wrapper { text-align: center; background: var(--card); padding: 20px; border-radius: 20px; border: 2px solid var(--border); box-shadow: 0 0 40px rgba(251, 196, 15, 0.2); }
        h1 { color: var(--gold); margin: 0 0 10px; font-size: 2rem; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        
        #ui-bar { display: flex; justify-content: space-between; width: 800px; margin-bottom: 10px; font-family: monospace; font-size: 1.1rem; }
        .timer-label { color: #8b949e; }
        
        #game-stage { position: relative; width: 800px; height: 500px; border: 3px solid #444; border-radius: 10px; overflow: hidden; }
        canvas { background: #050505; display: block; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 8px; }
        .win-title { font-size: 3rem; font-weight: bold; margin-bottom: 20px; }
        
        .control-hint { margin-top: 20px; font-size: 0.9rem; color: #666; display: flex; justify-content: space-around; width: 800px; }
        .btn { padding: 10px 25px; font-size: 1rem; background: transparent; color: var(--gold); border: 2px solid var(--gold); border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: var(--gold); color: #0d1117; box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <button onclick="location.href='index.html'" style="position:absolute; top:20px; left:20px; background:none; border:none; color:#58a6ff; cursor:pointer;">🏠 返回大廳</button>
        <h1>究極閃躲：領主對決</h1>

        <div id="game-stage">
            <div id="status-overlay" class="overlay">
                <div id="win-msg" class="win-title" style="color:var(--gold)">準備開戰</div>
                <p style="color:#8b949e; margin-bottom:30px;">P1 綠色人 vs P2 紅色殺手。炸彈對雙方都有害！</p>
                <button class="btn" onclick="startGame()">⚔️ 開始對決 ⚔️</button>
            </div>

            <div id="ui-bar" style="position:absolute; top:10px; left:10px; z-index:50; width:780px; pointer-events:none;">
                <span style="color:var(--p1)">P1 逃脫中</span>
                <span class="timer-label">生存: <span id="timer">0</span>s</span>
                <span style="color:var(--p2)">P2 殺手</span>
            </div>
            <canvas id="gameCanvas" width="800" height="500"></canvas>
        </div>

        <div class="control-hint">
            <span style="color:var(--p1)">P1 (綠): W A S D</span>
            <span style="color:var(--p2)">P2 (紅): ↑ ↓ ← →</span>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerElement = document.getElementById('timer');
    const winMsgElement = document.getElementById('win-msg');
    const overlayElement = document.getElementById('status-overlay');

    let gameRunning = false;
    let score = 0;
    let startTime;
    let bombs = [];
    let bombInterval;
    const keys = {};

    // P1: 逃脫者 (稍微快一點)
    const p1 = { x: 0, y: 0, size: 20, speed: 5.5, color: '#33ff33' };

    // P2: 殺手 (體型較大)
    const p2 = { x: 0, y: 0, size: 28, speed: 4.8, color: '#ff3333' };

    window.addEventListener('keydown', e => { keys[e.code] = true; if(gameRunning && e.code.startsWith('Arrow')) e.preventDefault(); });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function startGame() {
        overlayElement.style.display = 'none';
        
        // 初始化位置
        p1.x = 650; p1.y = 380;
        p2.x = 100; p2.y = 100;
        bombs = [];
        pScore = 0;
        
        gameRunning = true;
        startTime = Date.now();
        
        // 炸彈生成 (每 1.2 秒)
        clearInterval(bombInterval);
        bombInterval = setInterval(() => {
            if (gameRunning) {
                bombs.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    radius: 10,
                    speed: 3 + Math.random() * 3
                });
            }
        }, 1200);

        requestAnimationFrame(gameLoop);
    }

    function gameLoop() {
        if (!gameRunning) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        score = Math.floor((Date.now() - startTime) / 1000);
        timerElement.innerText = score;

        // P1 控制 (WASD)
        if ((keys['KeyW']) && p1.y > 0) p1.y -= p1.speed;
        if ((keys['KeyS']) && p1.y < canvas.height - p1.size) p1.y += p1.speed;
        if ((keys['KeyA']) && p1.x > 0) p1.x -= p1.speed;
        if ((keys['KeyD']) && p1.x < canvas.width - p1.size) p1.x += p1.speed;

        // P2 控制 (方向鍵)
        if ((keys['ArrowUp']) && p2.y > 0) p2.y -= p2.speed;
        if ((keys['ArrowDown']) && p2.y < canvas.height - p2.size) p2.y += p2.speed;
        if ((keys['ArrowLeft']) && p2.x > 0) p2.x -= p2.speed;
        if ((keys['ArrowRight']) && p2.x < canvas.width - p2.size) p2.x += p2.speed;

        // 炸彈更新與碰撞 (對雙方都有害)
        bombs.forEach((bomb, index) => {
            bomb.y += bomb.speed;
            if (bomb.y > canvas.height) bombs.splice(index, 1);

            if (checkCircleRect(bomb, p1)) gameOver(`P2 紅方獲勝！\n(P1 逃脫者被炸死了)`, 'var(--p2)');
            if (checkCircleRect(bomb, p2)) gameOver(`P1 綠方獲勝！\n(P2 殺手自己炸死了)`, 'var(--p1)');
        });

        // P1 與 P2 碰撞檢測 (殺手抓到小人)
        if (checkRectRect(p1, p2)) {
            gameOver(`P2 殺手捕獲成功！\nP1 存活了 ${score} 秒`, 'var(--p2)');
        }
    }

    function draw() {
        // 清空背景
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 畫網格背景增加空間感
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=50){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=50){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

        // 畫 P1 (小人)
        ctx.shadowBlur = 15;
        ctx.shadowColor = p1.color;
        ctx.fillStyle = p1.color;
        ctx.fillRect(p1.x, p1.y, p1.size, p1.size);

        // 畫 P2 (殺手)
        ctx.shadowColor = p2.color;
        ctx.fillStyle = p2.color;
        ctx.fillRect(p2.x, p2.y, p2.size, p2.size);

        // 畫炸彈
        ctx.shadowColor = '#ffaa00';
        ctx.fillStyle = '#ffaa00';
        bombs.forEach(bomb => {
            ctx.beginPath();
            ctx.arc(bomb.x, bomb.y, bomb.radius, 0, Math.PI * 2);
            ctx.fill();
        });
        
        ctx.shadowBlur = 0;
    }

    // 圓形與矩形碰撞
    function checkCircleRect(circle, rect) {
        const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.size));
        const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.size));
        const distance = Math.sqrt((circle.x - closestX) ** 2 + (circle.y - closestY) ** 2);
        return distance < circle.radius;
    }

    // 矩形與矩形碰撞
    function checkRectRect(r1, r2) {
        return r1.x < r2.x + r2.size &&
               r1.x + r1.size > r2.x &&
               r1.y < r2.y + r2.size &&
               r1.y + r1.size > r2.y;
    }

    function gameOver(msg, color) {
        gameRunning = false;
        clearInterval(bombInterval);
        winMsgElement.innerText = msg;
        winMsgElement.style.color = color;
        overlayElement.style.display = 'flex';
        document.querySelector('#status-overlay .btn').innerText = '再戰一局';
    }
</script>
</body>
</html>
