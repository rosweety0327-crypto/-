<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小宥領主：三棲全控制基地</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; position: absolute; top: 0; background: #05070a; z-index: 10; }
        .active { display: flex; }
        h1 { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); font-size: 26px; }
        .menu-btn { background: #238636; border: none; color: white; padding: 15px 30px; border-radius: 12px; font-size: 18px; margin: 8px; width: 220px; cursor: pointer; }
        .game-header { background: #161b22; width: 100%; padding: 8px; border-bottom: 3px solid #ff4757; display: flex; justify-content: space-around; align-items: center; }
        .speed-info { color: #ff4757; font-weight: bold; font-size: 14px; }
        .item-bar { display: flex; gap: 10px; margin: 5px 0; }
        .item-btn { background: #30363d; border: 1px solid #f1c40f; color: white; padding: 8px 15px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .item-btn:disabled { opacity: 0.3; border-color: #444; color: #888; }
        .skill-notif { height: 35px; color: #00f0f0; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #00f0f0; text-align: center;}
        .main-layout { display: flex; gap: 15px; align-items: flex-start; }
        .preview-box { background: #000; border: 2px solid #58a6ff; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; }
        #next-canvas { width: 60px; height: 60px; background: #000; }
        canvas#c1 { width: 180px; height: 360px; border: 3px solid #30363d; }
        canvas#c2 { width: 60px; height: 120px; opacity: 0.4; }
        .touch-panel { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; margin-top: 10px; }
        .t-btn { background: #21262d; border: 1px solid #30363d; color: white; height: 60px; display: flex; justify-content: center; align-items: center; border-radius: 12px; font-size: 24px; user-select: none; }
        .gp-status { font-size: 10px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div id="sc-menu" class="screen active">
    <h1>⚔️ 領主神諭基地</h1>
    <div id="gp-info" class="gp-status">🎮 未偵測到手把 (按任意鍵連接)</div>
    <button class="menu-btn" onclick="goSingle()">👤 單人特訓</button>
    <button class="menu-btn" style="background:#1f6feb;" onclick="showSc('sc-id')">👥 雙人對戰</button>
</div>

<div id="sc-id" class="screen">
    <h2 style="color:#58a6ff">輸入對戰 ID</h2>
    <input type="text" id="rid" maxlength="4" style="padding:10px; border-radius:8px; font-size:20px; width:100px; text-align:center; background:#161b22; color:white; border:2px solid #30363d;">
    <button class="menu-btn" onclick="startNet(true)">建立房間</button>
    <button class="menu-btn" style="background:#8957e5;" onclick="startNet(false)">加入對戰</button>
</div>

<div id="sc-game" class="screen">
    <div class="game-header">
        <div style="color:#58a6ff">⏳ <span id="time-val">00:00</span></div>
        <div class="speed-info" id="speed-display">LV.1 (1000ms)</div>
        <div style="color:#f1c40f;">💎 <span id="s1">0</span></div>
    </div>
    <div class="item-bar">
        <button class="item-btn" id="btn-reroll" onclick="p1.useReroll()">🎨 染色 (<span id="count-r">3</span>)</button>
        <button class="item-btn" id="btn-snipe" onclick="p1.useSnipe()">🎯 狙擊 (<span id="count-s">3</span>)</button>
    </div>
    <div class="skill-notif" id="skill-notif"></div>
    <div class="main-layout">
        <canvas id="c1"></canvas>
        <div class="side-panel">
            <div class="preview-box"><div style="font-size:10px; color:#58a6ff;">NEXT</div><canvas id="next-canvas"></canvas></div>
            <canvas id="c2"></canvas>
        </div>
    </div>
    <div class="touch-panel">
        <div class="t-btn" style="grid-column:2" onclick="p1.rotate()">🔄</div>
        <div class="t-btn" style="grid-column:1; grid-row:2" onclick="p1.move(-1, 0)">⬅️</div>
        <div class="t-btn" style="grid-column:2; grid-row:2" onclick="p1.move(0, 1)">⬇️</div>
        <div class="t-btn" style="grid-column:3; grid-row:2" onclick="p1.move(1, 0)">➡️</div>
    </div>
</div>

<script>
    const SHAPES = [
        { s: [[1,1,1,1]], c: '#00f0f0' }, { s: [[1,1],[1,1]], c: '#f0f000' },
        { s: [[0,1,0],[1,1,1]], c: '#a000f0' }, { s: [[1,1,0],[0,1,1]], c: '#f00000' },
        { s: [[0,1,1],[1,1,0]], c: '#00f000' }, { s: [[1,0,0],[1,1,1]], c: '#0000f0' },
        { s: [[0,0,1],[1,1,1]], c: '#f0a000' }
    ];
    const COLS=10, ROWS=20, SIZE=18;
    let peer, conn, startTime, timerInt, dropTimeout, gpLastTime = 0;

    function showSc(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    class Game {
        constructor(cid, sid, nextCid) {
            this.cvs=document.getElementById(cid); this.ctx=this.cvs.getContext('2d');
            this.cvs.width=COLS*SIZE; this.cvs.height=ROWS*SIZE;
            if(nextCid) { this.ncvs=document.getElementById(nextCid); this.nctx=this.ncvs.getContext('2d'); this.ncvs.width=60; this.ncvs.height=60; }
            this.sel=document.getElementById(sid); this.reset();
        }
        reset() { 
            this.grid=Array.from({length:ROWS},()=>Array(COLS).fill(0)); 
            this.score=0; this.level=1; this.dropInterval=1000; this.rerollCount=3; this.snipeCount=3;
            if(this.sel) this.updateUI(); this.genNext(); this.spawn(); 
        }
        updateUI() {
            this.sel.innerText = Math.floor(this.score);
            document.getElementById('speed-display').innerText = `LV.${this.level} (${Math.floor(this.dropInterval)}ms)`;
            document.getElementById('count-r').innerText = this.rerollCount;
            document.getElementById('count-s').innerText = this.snipeCount;
            document.getElementById('btn-reroll').disabled = (this.rerollCount <= 0);
            document.getElementById('btn-snipe').disabled = (this.snipeCount <= 0);
        }
        genNext() { this.nextPiece = SHAPES[Math.floor(Math.random()*7)]; this.drawNext(); }
        drawNext() { if(!this.nctx) return; this.nctx.clearRect(0,0,60,60); this.nctx.fillStyle = this.nextPiece.c; this.nextPiece.s.forEach((row,y)=>row.forEach((v,x)=>{ if(v) this.nctx.fillRect(x*12+15, y*12+15, 11, 11); })); }
        spawn() { this.piece = { pos: {x:3, y:0}, shape: this.nextPiece.s, color: this.nextPiece.c }; this.genNext(); if(this.collide()) this.reset(); }
        useReroll() { if(this.rerollCount > 0) { this.piece.color = SHAPES[Math.floor(Math.random()*7)].c; this.rerollCount--; this.updateUI(); } }
        useSnipe() {
            if(this.snipeCount > 0) {
                const bottomRow = this.grid[ROWS-1];
                if(bottomRow.some(cell => cell !== 0)) {
                    const uniqueColors = new Set(bottomRow.filter(c => c !== 0)).size;
                    this.applyColorSkill(uniqueColors, ROWS-1);
                    this.score += 100;
                }
                this.grid.pop(); this.grid.unshift(Array(COLS).fill(0));
                this.snipeCount--; this.updateUI(); sync();
            }
        }
        collide() { const {pos, shape}=this.piece; for(let y=0;y<shape.length;y++)for(let x=0;x<shape[y].length;x++) if(shape[y][x] && (this.grid[y+pos.y]?.[x+pos.x]!==0)) return true; return false; }
        move(dx,dy) { this.piece.pos.x+=dx; this.piece.pos.y+=dy; if(this.collide()){ this.piece.pos.x-=dx; this.piece.pos.y-=dy; if(dy>0) this.freeze(); return false; } sync(); return true; }
        rotate() { const r = this.piece.shape[0].map((_,i)=>this.piece.shape.map(row=>row[i]).reverse()); const prev = this.piece.shape; this.piece.shape = r; if(this.collide()) this.piece.shape = prev; sync(); }
        freeze() { this.piece.shape.forEach((row,y)=>row.forEach((v,x)=>{ if(v) this.grid[y+this.piece.pos.y][x+this.piece.pos.x] = this.piece.color; })); this.clearLines(); this.spawn(); sync(); }
        clearLines() {
            let cleared = 0;
            for(let y=ROWS-1; y>=0; y--){
                if(this.grid[y].every(cell => cell !== 0)){
                    const count = new Set(this.grid[y].filter(c => c!==0)).size;
                    this.applyColorSkill(count, y);
                    this.grid.splice(y,1); this.grid.unshift(Array(COLS).fill(0));
                    cleared++; y++;
                }
            }
            if(cleared > 0 && this.sel) {
                this.score += cleared * 100;
                this.level = Math.floor(this.score / 200) + 1;
                this.dropInterval = Math.max(50, Math.floor(1000 * Math.pow(0.85, this.level - 1)));
                this.updateUI();
            }
        }
        applyColorSkill(count, yIndex) {
            const notif = document.getElementById('skill-notif');
            const skills = { 2:"雙子之力", 3:"三原色爆發", 4:"元素亂流", 5:"五行封印", 6:"虹色奇蹟", 7:"領主領域" };
            if(skills[count]) {
                notif.innerText = `✨ ${skills[count]}！`;
                if(count === 2) this.score += 200; if(count === 3) this.score += 500;
                if(count === 4) this.grid.splice(0, 2), this.grid.unshift(Array(COLS).fill(0), Array(COLS).fill(0));
                if(count === 7) this.grid = Array.from({length:ROWS},()=>Array(COLS).fill(0));
                setTimeout(() => notif.innerText = "", 1500);
            }
        }
        draw() {
            this.ctx.clearRect(0,0,this.cvs.width,this.cvs.height);
            this.grid.forEach((row,y)=>row.forEach((v,x)=>{ if(v) { this.ctx.fillStyle = v; this.ctx.fillRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1); } }));
            if(this.piece) this.piece.shape.forEach((row,y)=>row.forEach((v,x)=>{ if(v) { this.ctx.fillStyle = this.piece.color; this.ctx.fillRect((this.piece.pos.x+x)*SIZE, (this.piece.pos.y+y)*SIZE, SIZE-1, SIZE-1); } }));
        }
    }

    const p1 = new Game('c1','s1','next-canvas');
    const p2 = new Game('c2', null, null);

    // --- 🎮 Switch 手把控制邏輯 ---
    window.addEventListener("gamepadconnected", (e) => { document.getElementById('gp-info').innerText = `🎮 手把已連接: ${e.gamepad.id}`; });
    function handleGamepad() {
        const gps = navigator.getGamepads();
        if(!gps[0]) return;
        const gp = gps[0];
        const now = Date.now();
        if(now - gpLastTime < 150) return; // 防止過快重複觸發

        if(gp.axes[0] < -0.5 || gp.buttons[14].pressed) { p1.move(-1, 0); gpLastTime = now; } // 左
        if(gp.axes[0] > 0.5 || gp.buttons[15].pressed) { p1.move(1, 0); gpLastTime = now; }  // 右
        if(gp.axes[1] > 0.5 || gp.buttons[13].pressed) { p1.move(0, 1); gpLastTime = now; }  // 下
        if(gp.buttons[0].pressed || gp.buttons[1].pressed || gp.buttons[12].pressed) { p1.rotate(); gpLastTime = now; } // A/B或上旋轉
    }

    // --- 💻 電腦鍵盤控制邏輯 ---
    window.addEventListener('keydown', e => {
        if(e.key==='ArrowLeft') p1.move(-1,0);
        if(e.key==='ArrowRight') p1.move(1,0);
        if(e.key==='ArrowDown') p1.move(0,1);
        if(e.key==='ArrowUp' || e.key===' ') p1.rotate();
    });

    function goSingle() { showSc('sc-game'); startTimer(); p1.reset(); startDropLoop(); }
    function startNet(host) {
        const id = "YU-" + document.getElementById('rid').value;
        peer = new Peer(id);
        if(host) peer.on('connection', c=>{conn=c; setupNet(); startTimer(); startDropLoop();});
        else { conn=peer.connect(id); setupNet(); startTimer(); startDropLoop(); }
        showSc('sc-game'); p1.reset();
    }
    function setupNet(){ conn.on('data', d=>{ p2.grid=d.g; p2.piece=d.p; }); }
    function sync(){ if(conn && conn.open) conn.send({g:p1.grid, p:p1.piece}); }
    function startTimer() { startTime = Date.now(); clearInterval(timerInt); timerInt = setInterval(() => { const diff = Math.floor((Date.now() - startTime) / 1000); document.getElementById('time-val').innerText = `${String(Math.floor(diff/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')}`; }, 1000); }
    function startDropLoop() { clearTimeout(dropTimeout); p1.move(0, 1); dropTimeout = setTimeout(startDropLoop, p1.dropInterval); }
    function loop() { handleGamepad(); p1.draw(); p2.draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
