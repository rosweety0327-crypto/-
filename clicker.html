<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>點數收割者</title>
    <style>
        body { background: #0d1117; color: white; text-align: center; font-family: sans-serif; }
        .shop-item { background: #161b22; border: 1px solid #30363d; margin: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #2ecc71; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
    </style>
</head>
<body>
    <h1>🚜 點數收割工廠</h1>
    <h2 id="pts-display">💎 點數：0</h2>
    <div style="font-size: 12px; color: #888;">每秒自動生產：<span id="pps">0</span> 點</div>
    <hr>
    <div class="shop-item">
        <div><span>🤖 初級機器人</span><br><small>成本: 200 點 (+2/秒)</small></div>
        <button onclick="buy(200, 2)">購買</button>
    </div>
    <div class="shop-item">
        <div><span>🏭 大型收割廠</span><br><small>成本: 1000 點 (+15/秒)</small></div>
        <button onclick="buy(1000, 15)">購買</button>
    </div>
    <div class="shop-item">
        <div><span>🚀 衛星點數砲</span><br><small>成本: 5000 點 (+100/秒)</small></div>
        <button onclick="buy(5000, 100)">購買</button>
    </div>
    <button onclick="location.href='index.html'" style="background:#58a6ff; margin-top:20px;">返回大廳</button>

    <script>
        let db = JSON.parse(localStorage.getItem('lord_mega_db_v5')) || {pts:0};
        let pps = 0;
        function update() { 
            document.getElementById('pts-display').innerText = "💎 點數：" + Math.floor(db.pts);
            document.getElementById('pps').innerText = pps;
        }
        function buy(cost, power) {
            if(db.pts >= cost) { db.pts -= cost; pps += power; update(); save(); }
            else alert("點數不夠啦！");
        }
        function save() { localStorage.setItem('lord_mega_db_v5', JSON.stringify(db)); }
        setInterval(() => { if(pps > 0) { db.pts += pps; save(); update(); } }, 1000);
        update();
    </script>
</body>
</html>
